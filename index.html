<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Texteur - Jeu de Mots</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Écran de connexion -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>📝 Mission Texteur</h2>
            <p>Entre tes informations pour commencer</p>
            <input type="text" id="massar-in" placeholder="Code Massar">
            <input type="date" id="date-in">
            <button onclick="authentifier()">Entrer dans l'atelier</button>
        </div>
    </div>

    <!-- Application principale -->
    <div id="game-app" class="app-container" style="display:none;">
        <main class="grid-area">
            <div id="grid-container" class="letter-grid"></div>
        </main>
        
        <aside class="workshop-area">
            <h3>Atelier du Texteur</h3>
            <p class="hint">Trouve le bon mot, puis cherche-le dans la grille.</p>
            <div id="anagram-container"></div>
        </aside>
    </div>

    <!-- Fenêtre de bilan -->
    <div id="feedback-overlay" class="modal-overlay" style="display:none;">
        <div class="feedback-box">
            <h3>🎓 Bilan : Le Texteur</h3>
            <p>Qu'as-tu appris dans la séquence « Texteur » ?</p>
            <textarea id="user-feedback" rows="5" placeholder="Décris tes nouvelles compétences..."></textarea>
            <button id="submit-btn" onclick="envoyerDonnees()">Envoyer au professeur</button>
            <p id="status-msg"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
